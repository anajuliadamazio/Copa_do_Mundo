<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Gestão de Seleções - Copa do Mundo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-fifa-green { background-color: #006b3f; }
        .text-fifa-green { color: #006b3f; }
        /* Nova cor de fundo Verde Escuro adicionada aqui */
        .bg-verde-escuro { background-color: #013220; }
    </style>
</head>
<body class="bg-verde-escuro font-sans text-gray-800">

    <div class="container mx-auto p-6 max-w-5xl">
        
        <header class="mb-8 text-center bg-white p-6 rounded-lg shadow-md border-t-8 border-yellow-400">
            <h1 class="text-4xl font-bold text-fifa-green mb-2">🏆 FIFA World Cup</h1>
            <p class="text-gray-600">Sistema de Gerenciamento de Seleções</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-1 h-fit">
                <h2 id="titulo-form" class="text-xl font-bold mb-4 border-b pb-2">Cadastrar Seleção</h2>
                
                <form id="form-selecao" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Nome da Seleção</label>
                        <input type="text" id="nome" required placeholder="Ex: Brasil" 
                               class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-green-500">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Grupo</label>
                        <input type="text" id="grupo" required maxlength="4" placeholder="Ex: G" 
                               class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-green-500 uppercase">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Títulos (Quantidade/Anos)</label>
                        <input type="text" id="titulos" required placeholder="Ex: 5 (1958, 1962...)" 
                               class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-green-500">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Criado em</label>
                        <input type="date" id="criado_em" required 
                               class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-green-500">
                    </div>

                    <div class="flex flex-col gap-2">
                        <button type="submit" id="btn-salvar" class="w-full bg-fifa-green text-white font-bold py-2 px-4 rounded hover:bg-green-800 transition">
                            Salvar Seleção
                        </button>
                        
                        <button type="button" id="btn-cancelar" onclick="cancelarEdicao()" class="hidden w-full bg-gray-400 text-white font-bold py-2 px-4 rounded hover:bg-gray-500 transition">
                            Cancelar Edição
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2 overflow-x-auto">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold">Seleções Cadastradas</h2>
                    
                    <div class="w-1/2 relative">
                        <input type="text" id="campo-busca" placeholder="Buscar seleção, título ou ano..." 
                               class="w-full border border-gray-300 rounded-full py-1 px-4 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 shadow-sm">
                        <span class="absolute right-3 top-1.5 text-gray-400 text-sm">🔍</span>
                    </div>
                </div>
                
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700">
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">Nome</th>
                            <th class="p-3 border-b">Grupo</th>
                            <th class="p-3 border-b">Títulos</th>
                            <th class="p-3 border-b">Criado em</th>
                            <th class="p-3 border-b text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
                
                <p id="msg-vazia" class="text-center text-gray-500 mt-4 hidden">Nenhuma seleção cadastrada ainda.</p>
            </div>
            
        </div>
    </div>

    <script>
        let bancoDeDados = [];
        let idCounter = 1; 
        let idEmEdicao = null; 

        const form = document.getElementById('form-selecao');
        const tabelaCorpo = document.getElementById('tabela-corpo');
        const msgVazia = document.getElementById('msg-vazia');
        const campoBusca = document.getElementById('campo-busca');
        
        const tituloForm = document.getElementById('titulo-form');
        const btnSalvar = document.getElementById('btn-salvar');
        const btnCancelar = document.getElementById('btn-cancelar');

        function formatarData(dataISO) {
            if(!dataISO) return '';
            const partes = dataISO.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function renderizarTabela(dados = bancoDeDados) {
            tabelaCorpo.innerHTML = ''; 
            
            if (dados.length === 0) {
                msgVazia.classList.remove('hidden');
                msgVazia.innerText = bancoDeDados.length === 0 ? 
                    "Nenhuma seleção cadastrada ainda." : "Nenhum resultado encontrado para a busca.";
            } else {
                msgVazia.classList.add('hidden');
                
                dados.forEach((selecao) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition border-b";
                    
                    tr.innerHTML = `
                        <td class="p-3 font-semibold text-gray-600">#${selecao.id}</td>
                        <td class="p-3 font-bold">${selecao.nome}</td>
                        <td class="p-3"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold">${selecao.grupo}</span></td>
                        <td class="p-3 text-sm">${selecao.titulos}</td>
                        <td class="p-3 text-sm text-gray-500">${formatarData(selecao.criado_em)}</td>
                        <td class="p-3 text-center">
                            <button onclick="editarSelecao(${selecao.id})" class="text-blue-500 hover:text-blue-700 mr-2" title="Editar">
                                ✏️
                            </button>
                            <button onclick="removerSelecao(${selecao.id})" class="text-red-500 hover:text-red-700" title="Excluir">
                                🗑️
                            </button>
                        </td>
                    `;
                    tabelaCorpo.appendChild(tr);
                });
            }
        }

        campoBusca.addEventListener('input', function() {
            const termo = campoBusca.value.toLowerCase(); 
            const dadosFiltrados = bancoDeDados.filter(selecao => {
                return selecao.nome.toLowerCase().includes(termo) || 
                       selecao.titulos.toLowerCase().includes(termo) ||
                       selecao.criado_em.includes(termo); 
            });
            renderizarTabela(dadosFiltrados);
        });

        function editarSelecao(id) {
            const selecao = bancoDeDados.find(s => s.id === id);
            
            if (selecao) {
                document.getElementById('nome').value = selecao.nome;
                document.getElementById('grupo').value = selecao.grupo;
                document.getElementById('titulos').value = selecao.titulos;
                document.getElementById('criado_em').value = selecao.criado_em;

                idEmEdicao = id;
                tituloForm.innerText = "Editar Seleção #" + id;
                btnSalvar.innerText = "Atualizar Seleção";
                btnSalvar.classList.replace('bg-fifa-green', 'bg-blue-600');
                btnSalvar.classList.replace('hover:bg-green-800', 'hover:bg-blue-800');
                btnCancelar.classList.remove('hidden');
            }
        }

        function cancelarEdicao() {
            idEmEdicao = null;
            form.reset();
            
            tituloForm.innerText = "Cadastrar Seleção";
            btnSalvar.innerText = "Salvar Seleção";
            btnSalvar.classList.replace('bg-blue-600', 'bg-fifa-green');
            btnSalvar.classList.replace('hover:bg-blue-800', 'hover:bg-green-800');
            btnCancelar.classList.add('hidden');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault(); 

            if (idEmEdicao !== null) {
                const index = bancoDeDados.findIndex(s => s.id === idEmEdicao);
                
                bancoDeDados[index].nome = document.getElementById('nome').value;
                bancoDeDados[index].grupo = document.getElementById('grupo').value.toUpperCase();
                bancoDeDados[index].titulos = document.getElementById('titulos').value;
                bancoDeDados[index].criado_em = document.getElementById('criado_em').value;

                cancelarEdicao(); 

            } else {
                const novaSelecao = {
                    id: idCounter++, 
                    nome: document.getElementById('nome').value,
                    grupo: document.getElementById('grupo').value.toUpperCase(),
                    titulos: document.getElementById('titulos').value,
                    criado_em: document.getElementById('criado_em').value
                };
                bancoDeDados.push(novaSelecao);
                form.reset();
            }

            campoBusca.value = ''; 
            renderizarTabela();
        });

        function removerSelecao(id) {
            bancoDeDados = bancoDeDados.filter(selecao => selecao.id !== id);
            
            if (idEmEdicao === id) {
                cancelarEdicao();
            }

            const eventoDeBusca = new Event('input');
            campoBusca.dispatchEvent(eventoDeBusca); 
        }

        renderizarTabela();
    </script>
</body>
</html>
